syntax = "proto3";

package heimdall;
option go_package = "./proto";

service DataService{
    rpc WriteAction (stream WriteRequest) returns (WriteResponse);
    rpc ReadAction (ReadRequest) returns (stream ReadResponse);
    rpc ListFiles(EmptyRequest) returns (ListResponse);
}

message WriteRequest {
    oneof request {
        FileMetadata metadata = 1;
        bytes chunk_data = 2;
    }
}

message FileMetadata {
    string file_name = 1;
}

message WriteResponse {
    bool success = 1;
    int64 timestamp = 2;
    string message = 3;
}

message ReadRequest {
    string file_name = 1;
    int64 timestamp = 2;
}

message ReadResponse {
    bytes chunk_data = 1;
}

message EmptyRequest {}

message VersionList {
    repeated int64 timestamps = 1;
}

message ListResponse {
    map<string, VersionList> files = 1;
}